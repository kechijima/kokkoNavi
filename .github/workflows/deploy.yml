name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ── ソースコード取得 ──────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js セットアップ ──────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 依存関係インストール ──────────────────────────────
      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      # ── Cloud Functions ビルド ────────────────────────────
      - name: Build Cloud Functions
        run: cd functions && npm run build

      # ── LINE環境変数の書き出し ─────────────────────────────
      - name: Create functions .env
        run: |
          if [ -z "${{ secrets.LINE_CHANNEL_SECRET }}" ] || [ -z "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" ] || [ -z "${{ secrets.LIFF_ID }}" ]; then
            echo "Required LINE secrets are missing. Set LINE_CHANNEL_SECRET, LINE_CHANNEL_ACCESS_TOKEN, and LIFF_ID in GitHub Actions secrets."
            exit 1
          fi
          echo "LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}" > functions/.env
          echo "LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" >> functions/.env
          echo "LIFF_ID=${{ secrets.LIFF_ID }}" >> functions/.env

      # ── Nuxt 静的ビルド ───────────────────────────────────
      - name: Generate Nuxt static site
        run: npm run generate
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          LIFF_ID: ${{ secrets.LIFF_ID }}
          LIFF_PROFILE_ID: ${{ secrets.LIFF_PROFILE_ID }}

      # ── Firebase デプロイ（全リソース） ───────────────────
      - name: Deploy to Firebase
        run: npx firebase-tools deploy --project kokkonavi --non-interactive --force
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
