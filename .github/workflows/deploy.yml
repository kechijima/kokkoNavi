name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ── ソースコード取得 ──────────────────────────────────
      - uses: actions/checkout@v4

      # ── Node.js セットアップ ──────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 依存関係インストール ──────────────────────────────
      - name: Install root dependencies
        run: npm ci

      - name: Install functions dependencies
        run: cd functions && npm ci

      # ── Cloud Functions ビルド ────────────────────────────
      - name: Build Cloud Functions
        run: cd functions && npm run build

      # ── LINE環境変数の書き出し ─────────────────────────────
      - name: Prepare functions environment
        run: |
          if [ -n "${{ secrets.LINE_CHANNEL_SECRET }}" ] && [ -n "${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" ] && [ -n "${{ secrets.LIFF_ID }}" ]; then
            echo "LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}" > functions/.env
            echo "LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}" >> functions/.env
            echo "LIFF_ID=${{ secrets.LIFF_ID }}" >> functions/.env
            echo "FIREBASE_DEPLOY_ARGS=" >> "$GITHUB_ENV"
          else
            echo "::warning::LINE secrets are missing. Skipping Functions deploy to avoid overwriting working environment variables."
            echo "FIREBASE_DEPLOY_ARGS=--only hosting,firestore" >> "$GITHUB_ENV"
          fi

      # ── Nuxt 静的ビルド ───────────────────────────────────
      - name: Generate Nuxt static site
        run: npm run generate
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          LIFF_ID: ${{ secrets.LIFF_ID }}
          LIFF_PROFILE_ID: ${{ secrets.LIFF_PROFILE_ID }}

      # ── Firebase デプロイ（Functions・先に実行し失敗を検知） ─
      # firebase-tools は一部Functionsの更新に失敗してもexit 0を返すため、
      # 出力を検査して「failed to update/create function」が出たらジョブを失敗させる。
      - name: Deploy Cloud Functions
        if: env.FIREBASE_DEPLOY_ARGS == ''
        run: |
          set -o pipefail
          npx firebase-tools deploy --project kokkonavi --non-interactive --force --only functions --debug 2>&1 | tee functions-deploy.log
          if grep -Eiq "failed to (update|create) function|functions: failed" functions-deploy.log; then
            echo "::error::Cloud Functions のデプロイに失敗しました。上のログを確認してください。"
            exit 1
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── Firebase デプロイ（hosting / firestore / storage） ─
      # hostingはコンテンツ無変更時に「current active version」400を返すが
      # これは正常（再リリース不要）なので無視する。
      - name: Deploy hosting, firestore, storage
        run: |
          set -o pipefail
          npx firebase-tools deploy --project kokkonavi --non-interactive --force --only hosting,firestore,storage 2>&1 | tee hosting-deploy.log || true
          if grep -Eiq "current active version" hosting-deploy.log; then
            echo "ホスティングは既に最新（再リリース不要）のためスキップ扱いとします。"
            exit 0
          fi
          if grep -Eiq "^Error:|HTTP Error: [45]" hosting-deploy.log; then
            echo "::error::hosting/firestore/storage のデプロイに失敗しました。"
            exit 1
          fi
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      # ── リリース完了メール通知 ─────────────────────────────
      - name: Send release notification email
        if: success()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '✅ こっこナビ リリース完了 (${{ github.sha }})'
          to: ya0ma5gu2chi992501@gmail.com
          from: こっこナビ デプロイ通知
          body: |
            こっこナビのFirebaseへのリリースが完了しました。

            コミット: ${{ github.event.head_commit.message }}
            実行者: ${{ github.actor }}
            詳細: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            管理画面: https://kokkonavi.web.app
